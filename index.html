<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leprox</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      width: 100%;
      background: black;
      background-size: cover;
      background-position: center;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      transition: background-image 2s ease, opacity 2s ease;
      cursor: pointer;
    }

    .enter {
      color: white;
      font-size: 1.2rem;
      opacity: 0.9;
      transition: opacity 0.3s;
      position: absolute;
    }

    .enter:hover {
      opacity: 1;
    }

    .container {
      display: none;
      text-align: center;
      animation: fadeIn 1.5s ease forwards;
    }

    .card {
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(20px);
      padding: 40px 60px;
      border-radius: 20px;
      box-shadow: 0 0 40px rgba(255, 255, 255, 0.05);
      color: white;
      display: inline-block;
      text-align: center;
    }

    .profile-img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 15px;
      filter: grayscale(100%);
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 500;
      margin-bottom: 5px;
      text-shadow: 0 0 10px rgba(255,255,255,0.2);
    }

    p {
      font-size: 0.9rem;
      color: #aaa;
      margin-bottom: 25px;
    }

    .icons {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 30px;
    }

    .icons i {
      font-size: 1.5rem;
      color: #777;
      transition: 0.3s;
      cursor: pointer;
    }

    .icons i:hover {
      color: white;
      transform: scale(1.1);
    }

    .music-player {
      background: rgba(0,0,0,0.4);
      padding: 10px 20px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
      box-shadow: 0 0 15px rgba(255,255,255,0.05);
    }

    .music-player img {
      width: 30px;
      height: 30px;
      border-radius: 50%;
    }

    .music-player p {
      margin: 0;
      font-size: 0.8rem;
      color: #aaa;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }
  </style>
  <script src="https://kit.fontawesome.com/a2d9d5df91.js" crossorigin="anonymous"></script>
</head>
<body>
  <div class="enter" id="enterBtn">click to enter...</div>

  <div class="container" id="main">
    <div class="card">
      <img src="profile.jpg" class="profile-img" alt="profile">
      <h1>Leprox</h1>
      <p>Python and Html coder.</p>

      <div class="music-player">
        <img src="profile.jpg" alt="music">
        <p id="music-info">Leprox here... | 0:00 / 4:07</p>
        <audio id="audio" src="music.mp3"></audio>
      </div>
    </div>
  </div>

  <script>
    const enterText = document.getElementById('enterBtn');
    const main = document.getElementById('main');
    const audio = document.getElementById('audio');
    const musicInfo = document.getElementById('music-info');
    let entered = false;

    // Ekranın herhangi bir yerine tıklanınca
    document.body.addEventListener('click', () => {
      if (entered) return; // sadece bir kez
      entered = true;

      // imleci normale döndür
      document.body.style.cursor = "default";

      // "click to enter" kaybolsun
      enterText.style.animation = 'fadeOut 1s forwards';

      setTimeout(() => {
        enterText.style.display = 'none';
        
        // Arka plan gelsin
        document.body.style.backgroundImage = "url('background.jpg')";
        document.body.style.transition = "background-image 2s ease-in-out, opacity 2s ease";
        document.body.style.opacity = "1";

        // Kart gözüksün ve müzik başlasın
        main.style.display = 'block';
        audio.play();
      }, 1000);
    });

    // Süre güncelleme
    audio.addEventListener('timeupdate', () => {
      const current = formatTime(audio.currentTime);
      const duration = formatTime(audio.duration);
      musicInfo.textContent = `Leprox here... | ${current} / ${duration || "4:07"}`;
    });

    function formatTime(seconds) {
      if (isNaN(seconds)) return "0:00";
      const minutes = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${minutes}:${secs < 10 ? '0' : ''}${secs}`;
    }
  </script>
</body>
</html>
