<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leprox</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      width: 100%;
      background: black;
      background-size: cover;
      background-position: center;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      transition: background-image 2s ease, opacity 2s ease;
      cursor: pointer;
      user-select: none;
    }

    .enter {
      color: white;
      font-size: 1.2rem;
      opacity: 0.9;
      transition: opacity 0.3s;
      position: absolute;
    }

    .enter:hover {
      opacity: 1;
    }

    .container {
      display: none;
      text-align: center;
      animation: fadeIn 1.5s ease forwards;
    }

    .card {
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(20px);
      padding: 40px 60px;
      border-radius: 20px;
      box-shadow: 0 0 40px rgba(255, 255, 255, 0.05);
      color: white;
      display: inline-block;
      text-align: center;
    }

    .profile-img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 15px;
      filter: grayscale(100%);
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 500;
      margin-bottom: 5px;
      text-shadow: 0 0 10px rgba(255,255,255,0.2);
    }

    p {
      font-size: 0.9rem;
      color: #aaa;
      margin-bottom: 25px;
    }

    .music-player {
      background: rgba(0,0,0,0.4);
      padding: 10px 20px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
      box-shadow: 0 0 15px rgba(255,255,255,0.05);
    }

    .music-player img {
      width: 30px;
      height: 30px;
      border-radius: 50%;
    }

    .music-player p {
      margin: 0;
      font-size: 0.8rem;
      color: #aaa;
      width: 160px;
      text-align: center;
    }

    /* Ses kontrolü */
    .volume-control {
      position: fixed;
      top: 20px;
      left: 20px;
      display: none; /* Başta görünmesin */
      align-items: center;
      gap: 10px;
      z-index: 9999;
      pointer-events: auto;
    }

    .volume-icon {
      width: 30px;
      height: 30px;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .volume-icon:hover {
      transform: scale(1.1);
    }

    .volume-slider {
      width: 0;
      opacity: 0;
      transition: width 0.4s ease, opacity 0.4s ease;
      height: 6px;
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      appearance: none;
      outline: none;
      cursor: pointer;
    }

    .volume-control:hover .volume-slider {
      width: 130px;
      opacity: 1;
    }

    .volume-slider::-webkit-slider-runnable-track {
      background: linear-gradient(90deg, #999, #fff);
      height: 6px;
      border-radius: 10px;
    }

    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: white;
      margin-top: -4px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }
  </style>
</head>
<body oncontextmenu="return false;">
  <div class="enter" id="enterBtn">click to enter...</div>

  <div class="container" id="main">
    <div class="card">
      <img src="profile.jpg" class="profile-img" alt="profile">
      <h1>Leprox</h1>
      <p>Python and Html coder.</p>

      <div class="music-player">
        <img src="profile.jpg" alt="music">
        <p id="music-info">Leprox here... | 0:00 / 4:07</p>
        <audio id="audio" src="music.mp3"></audio>
      </div>
    </div>
  </div>

  <!-- Ses kontrolü -->
  <div class="volume-control" id="volumeControl">
    <img src="volume.png" class="volume-icon" alt="volume">
    <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.01" value="1">
  </div>

  <script>
    const enterText = document.getElementById('enterBtn');
    const main = document.getElementById('main');
    const audio = document.getElementById('audio');
    const musicInfo = document.getElementById('music-info');
    const volumeSlider = document.getElementById('volumeSlider');
    const volumeControl = document.getElementById('volumeControl');
    let entered = false;

    // Sadece ilk click çalışsın
    document.body.addEventListener('click', (e) => {
      if (entered) return;
      entered = true;

      enterText.style.animation = 'fadeOut 1s forwards';
      setTimeout(() => {
        enterText.style.display = 'none';
        document.body.style.backgroundImage = "url('background.jpg')";
        document.body.style.transition = "background-image 2s ease-in-out, opacity 2s ease";
        document.body.style.opacity = "1";
        main.style.display = 'block';
        volumeControl.style.display = 'flex'; // Ses ikonu click sonrası gelsin
        audio.play();
      }, 1000);
    });

    // Müzik süresi
    audio.addEventListener('timeupdate', () => {
      const current = formatTime(audio.currentTime);
      const duration = formatTime(audio.duration);
      musicInfo.textContent = `Leprox here... | ${current} / ${duration || "4:07"}`;
    });

    function formatTime(seconds) {
      if (isNaN(seconds)) return "0:00";
      const minutes = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${minutes}:${secs < 10 ? '0' : ''}${secs}`;
    }

    // Ses kontrolü (sadece slider üzerinden çalışır)
    volumeSlider.addEventListener('input', () => {
      audio.volume = volumeSlider.value;
    });
  </script>
</body>
</html>
